<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出入庫資料記錄系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
        }
        /* 自定義 Radio 按鈕樣式 */
        input[type="radio"] {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #d1d5db;
            border-radius: 50%;
            outline: none;
            transition: all 0.2s;
            position: relative;
        }
        input[type="radio"]:checked {
            border-color: currentColor;
        }
        input[type="radio"]:checked::after {
            content: '';
            width: 0.625rem;
            height: 0.625rem;
            background-color: currentColor;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">出入庫管理</h1>
            <p class="text-gray-500 mt-2">請確實填寫各項欄位以維護庫存準確性</p>
        </div>

        <form id="dataForm" class="space-y-6">
            <!-- 日期欄位 -->
            <div>
                <label for="Message33" class="block text-sm font-semibold text-gray-700 mb-1">日期：</label>
                <input 
                    type="date" 
                    id="Message33" 
                    required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                >
            </div>

            <!-- 代號欄位 -->
            <div>
                <label for="Name" class="block text-sm font-semibold text-gray-700 mb-1">人員代號：</label>
                <input 
                    type="text" 
                    id="Name" 
                    required 
                    placeholder="例如：EMP001"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                >
            </div>

            <!-- 數量欄位 (原 Message) -->
            <div>
                <label for="Message" class="block text-sm font-semibold text-gray-700 mb-1">數量：</label>
                <input 
                    type="number" 
                    id="Message" 
                    required 
                    min="1"
                    placeholder="請輸入數量"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                >
            </div>

            <!-- 價錢欄位 (原 Message2) -->
            <div>
                <label for="Message2" class="block text-sm font-semibold text-gray-700 mb-1">單價/總價：</label>
                <input 
                    type="number" 
                    id="Message2" 
                    required 
                    placeholder="請輸入金額"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                >
            </div>

            <!-- 操作類型 -->
            <div>
                <span class="block text-sm font-semibold text-gray-700 mb-2">操作類型：</span>
                <div class="flex space-x-4">
                    <label class="flex-1 flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50 group">
                        <input type="radio" name="actionType" value="1" id="Messagee_out" checked class="text-blue-600">
                        <span class="ml-2 font-bold text-gray-700 group-has-[:checked]:text-blue-700">出庫</span>
                    </label>

                    <label class="flex-1 flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer transition has-[:checked]:border-green-600 has-[:checked]:bg-green-50 group">
                        <input type="radio" name="actionType" value="2" id="Messagee_in" class="text-green-600">
                        <span class="ml-2 font-bold text-gray-700 group-has-[:checked]:text-green-700">歸還</span>
                    </label>
                </div>
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 active:scale-[0.98] transition shadow-lg"
            >
                送出並記錄
            </button>
        </form>

        <!-- 狀態回饋 -->
        <div id="statusBox" class="mt-6 text-center text-sm font-medium hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWyobf4R0_bqo7rkEMjfggEFcIvhJjqMp8d-7-fS9a0FPEV4AUUO1dNzSKpVe3Ft__/exec';

        // 初始化日期為今天
        document.getElementById('Message33').valueAsDate = new Date();

        async function submitData(payload) {
            const statusBox = document.getElementById('statusBox');
            const submitBtn = document.getElementById('submitBtn');
            
            // UI 狀態切換
            statusBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            statusBox.classList.add('bg-blue-100', 'text-blue-700');
            statusBox.textContent = '⏱️ 資料傳輸中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 成功處理
                statusBox.classList.replace('bg-blue-100', 'bg-green-100');
                statusBox.classList.replace('text-blue-700', 'text-green-700');
                statusBox.textContent = '✅ 資料儲存成功！';
                
                document.getElementById('dataForm').reset();
                document.getElementById('Message33').valueAsDate = new Date();
                document.getElementById('Messagee_out').checked = true;

            } catch (error) {
                console.error('Error:', error);
                statusBox.classList.replace('bg-blue-100', 'bg-red-100');
                statusBox.classList.replace('text-blue-700', 'text-red-700');
                statusBox.textContent = '❌ 發生錯誤，請稍後再試。';
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                // 3秒後隱藏提示
                setTimeout(() => statusBox.classList.add('hidden'), 5000);
            }
        }

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const selectedAction = document.querySelector('input[name="actionType"]:checked');

            // 構建 Payload
            // 請確認 Google Sheet 標題欄位是否為以下名稱：
            const payload = {
                Date: document.getElementById('Message33').value,      // 日期
                Name: document.getElementById('Name').value,          // 代號
                Amount: document.getElementById('Message').value,     // 數量
                Price: document.getElementById('Message2').value,      // 價錢
                Action: selectedAction ? selectedAction.value : '1'    // 出庫(1) 或 歸還(2)
            };

            submitData(payload);
        });
    </script>
</body>
</html>
